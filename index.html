<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perchance AI Embed</title>

    <style>
        body {
            margin: 0;
            padding: 20px; /* שוליים מסביב */
            background-color: #111; /* רקע יפה */
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            height: calc(100vh - 40px); /* גובה כמעט מלא */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe 
            src="https://perchance.org/ai-text-to-image-generator"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
